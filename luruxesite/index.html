<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luruxe Perfumes | Premium Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --wa-color: #25D366;
            --vi-color: #7360f2;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto; 
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            font-family: 'Calibri', 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
        }

        body::before {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #00ffd5, #7360f2);
            filter: blur(100px);
            opacity: 0.15;
            z-index: 0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .container {
            width: 90%;
            max-width: 380px;
            max-height: 96vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 35px;
            position: relative;
            z-index: 1;
            text-align: center;
            box-sizing: border-box;
            margin: auto; 
        }

        .logo-wrapper {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            position: relative;
            padding: 3px;
            border-radius: 50%;
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            animation: flow 3s linear infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            background: #000;
        }

        .brand-title {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #ffffff 0%, #a1a1a1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .description {
            font-family: 'Calibri', sans-serif;
            font-size: 17px;
            line-height: 1.5;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.9);
            font-weight: bold;
            flex-shrink: 0;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            margin-bottom: 12px;
            border-radius: 18px;
            text-decoration: none;
            color: #fff !important;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            flex-shrink: 0;
        }

        .whatsapp { background: var(--wa-color); }
        .viber { background: var(--vi-color); }

        .rgb-link {
            text-decoration: none;
            display: block;
            margin-top: 15px;
            flex-shrink: 0;
        }

        .rgb-card {
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            padding: 2px;
            border-radius: 20px;
            animation: flow 2s linear infinite;
        }

        .inner-card {
            background: #000;
            padding: 12px;
            border-radius: 18px;
            color: #fff;
        }

        @keyframes flow {
            0% { background-position: 0%; }
            100% { background-position: 400%; }
        }

        .sp-tag { font-size: 11px; color: #00ffd5; font-weight: bold; }
        .sp-name { font-size: 18px; font-weight: 900; display: block; margin-top: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="brand.png" alt="Luxury" class="logo">
        </div>
        
        <div class="brand-title">LURUXE PERFUMES</div>

        <p class="description">
            بۆ داوا کردن و زانیارى زیاتر
            <br>
            کلیک لەم لینکانەی خوارەوە بکە
        </p>

        <a href="https://wa.me/9647515475970?text=سڵاو%20دەمەوێ%20داوا%20بکەم" class="btn whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i>
            <span>واتسئەپ</span>
        </a>

        <a href="viber://chat?number=%2B9647515475970&draft=سڵاو%20دەمەوێ%20داوا%20بکەم" class="btn viber" target="_blank">
            <i class="fab fa-viber"></i>
            <span>ڤایبەر</span>
        </a>

        <a href="https://wa.me/9647517562405?text=سڵاو%20سپۆنسەرم%20دەوێ" class="rgb-link" target="_blank">
            <div class="rgb-card">
                <div class="inner-card">
                    <span class="sp-tag">سپۆنسەر کراوە لەلایەن</span>
                    <span class="sp-name">Fovira Perfume</span>
                </div>
            </div>
        </a>
    </div>

</body>
</html>
